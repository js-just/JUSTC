name: Compile

on:
  push:
    branches: ["main"]
    tags:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      dirname:
        description: 'Directory name / Path'
        required: true
        default: 'development'
        type: string

env:
  DEFAULT_DIR: 'development'
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache

permissions:
  contents: read

concurrency:
  group: "wasm"
  cancel-in-progress: true

jobs:
  determine-dirpath:
    runs-on: ubuntu-latest
    outputs:
      dirpath: ${{ steps.set-dirpath.outputs.dirpath }}
    steps:
      - name: Set dirpath for push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: set-dirpath-push
        run: echo "dirpath=${{ env.DEFAULT_DIR }}" >> $GITHUB_OUTPUT

      - name: Set dirpath for tags
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: set-dirpath-tags
        run: echo "dirpath=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set dirpath for release
        if: github.event_name == 'release'
        id: set-dirpath-release
        run: echo "dirpath=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Set dirpath for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        id: set-dirpath-dispatch
        run: echo "dirpath=${{ github.event.inputs.dirname || env.DEFAULT_DIR }}" >> $GITHUB_OUTPUT

      - name: Set default dirpath
        if: steps.set-dirpath-push.outputs.dirpath == '' && steps.set-dirpath-tags.outputs.dirpath == '' && steps.set-dirpath-release.outputs.dirpath == '' && steps.set-dirpath-dispatch.outputs.dirpath == ''
        id: set-dirpath-default
        run: echo "dirpath=${{ env.DEFAULT_DIR }}" >> $GITHUB_OUTPUT

  compile-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev libidn2-dev
      - name: CMake
        run: bash linux/compile.sh "-DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install_root"
      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: justc-linux-cli
          path: ${{ github.workspace }}/install_root/bin/justc
          retention-days: 1

  compile-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'
      - name: Cache vcpkg + CMake deps
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            build/vcpkg_installed
            build/_deps
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
            vcpkg_cache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: vcpkg_cache
          key: ${{ runner.os }}-vcpkg-binary-${{ hashFiles('vcpkg.json','CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-binary-
      - name: Create vcpkg cache directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path vcpkg_cache
      - name: Clone vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          ./vcpkg/bootstrap-vcpkg.bat
      - name: Install dependencies
        shell: pwsh
        run: |
          ./vcpkg/vcpkg install cpr:x64-windows-static
          ./vcpkg/vcpkg install libidn2:x64-windows-static
          ./vcpkg/vcpkg install icu:x64-windows-static
          ./vcpkg/vcpkg install boost-multiprecision:x64-windows-static
          ./vcpkg/vcpkg install quickjs:x64-windows-static
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DBoost_USE_STATIC_LIBS=ON
      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --target ALL_BUILD -j 4
      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: justc-windows-cli
          path: ${{ github.workspace }}/build/Release/justc.exe
          retention-days: 1

  compile-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install libidn2 pkg-config boost icu4c
          if [ ! -f /opt/homebrew/lib/libidn2.dylib ] && [ -f /opt/homebrew/lib/libidn2.0.dylib ]; then
            ln -sf /opt/homebrew/lib/libidn2.0.dylib /opt/homebrew/lib/libidn2.dylib
          fi
      - name: Configure with explicit library path
        run: |
          export LDFLAGS="-L/opt/homebrew/lib"
          export CPPFLAGS="-I/opt/homebrew/include"
          export PKG_CONFIG_PATH="$(brew --prefix icu4c)/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-L/opt/homebrew/lib" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L/opt/homebrew/lib" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix icu4c)"
      - name: Fix QuickJS version conflict
        run: rm -f build/_deps/quickjs-src/version || true
      - name: Build
        run: cmake --build build --config Release
      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: justc-macos-cli
          path: build/justc
          retention-days: 1

  test-linux:
    runs-on: ubuntu-latest
    needs: compile-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download compiled files
        uses: actions/download-artifact@v4
        with:
          name: justc-linux-cli
          path: ${{ github.workspace }}/downloaded_artifacts
      - name: Install JUSTC to /usr/bin
        run: |
          sudo cp ${{ github.workspace }}/downloaded_artifacts/justc /usr/bin/
          sudo chmod +x /usr/bin/justc
      - name: Test
        run: bash test/linux/justc.sh

  test-windows:
    runs-on: windows-latest
    needs: compile-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download compiled files
        uses: actions/download-artifact@v4
        with:
          name: justc-windows-cli
          path: ${{ github.workspace }}/downloaded_artifacts
      - name: Test
        run: |
          Copy-Item ${{ github.workspace }}/downloaded_artifacts/justc.exe C:\
          & C:\justc.exe test/linux/test.justc

  download-luau:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Luau
        run: bash javascript/install_luau.sh
      - name: Upload compiled files
        uses: actions/upload-artifact@v4
        with:
          name: luau
          path: luau
          retention-days: 1

  compile-wasm:
    runs-on: ubuntu-latest
    needs: [determine-dirpath, compile-linux, download-luau]
    outputs:
      dirpath: ${{ steps.compile.outputs.dirpath }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Move just.config.js file to the root directory and copy javascript/core.js to javascript/core.txt and copy javascript/index.d.ts to javascript/index.d.txt and rename javascript/cli.js to javascript/cli.js.txt
        run: mv javascript/just.config.js just.config.js && cp javascript/core.js javascript/core.txt && cp javascript/index.d.ts javascript/index.d.txt && mv javascript/cli.js javascript/cli.js.txt
      - name: Compress core.js with Just an Ultimate Site Tool
        uses: js-just/_just@main
        with:
          path: javascript
      - name: Cache Emscripten SDK and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/emsdk
            ~/.cache/emsdk
            /tmp/emscripten_cache
            lua-5.4.4
          key: ${{ runner.os }}-emscripten-deps-${{ hashFiles('javascript/compile.sh', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-emscripten-deps-
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.19'
          actions-cache-folder: 'emsdk-cache'
      - name: Download compiled files
        uses: actions/download-artifact@v4
        with:
          name: justc-linux-cli
          path: ${{ github.workspace }}/downloaded_artifacts
      - name: Install JUSTC to /usr/bin
        run: |
          sudo cp ${{ github.workspace }}/downloaded_artifacts/justc /usr/bin/
          sudo chmod +x /usr/bin/justc
      - name: Download compiled Luau
        uses: actions/download-artifact@v4
        with:
          name: luau
          path: luau
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'
      - name: Compile C++ to WASM
        env:
          OUTPUT_DIR: ${{ needs.determine-dirpath.outputs.dirpath }}
        run: bash javascript/compile.sh "${{ needs.determine-dirpath.outputs.dirpath }}"
        id: compile
      - name: Copy LICENSE and README.md
        run: cp LICENSE javascript_output/${{ needs.compile-wasm.outputs.dirpath }}/LICENSE && cp README.md javascript_output/${{ needs.compile-wasm.outputs.dirpath }}/README.md
      - name: Upload compiled files
        uses: actions/upload-artifact@v4
        with:
          name: compiled-wasm
          path: javascript_output/${{ needs.determine-dirpath.outputs.dirpath }}/
          retention-days: 1

  test-nodejs:
    runs-on: ubuntu-latest
    needs: compile-wasm
    steps:
      - name: Download compiled files
        uses: actions/download-artifact@v4
        with:
          name: compiled-wasm
          path: javascript_output/${{ needs.determine-dirpath.outputs.dirpath }}/
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'
      - name: Test
        run: node javascript_output/${{ needs.compile-wasm.outputs.dirpath }}/test.js

  commit:
    runs-on: ubuntu-latest
    needs: compile-wasm
    steps:
      - name: Download compiled files
        uses: actions/download-artifact@v4
        with:
          name: compiled-wasm
          path: javascript_output/${{ needs.determine-dirpath.outputs.dirpath }}/
      - name: Cleanup
        run: rm javascript_output/$OUTPUT_DIR/test.js && rm -rf javascript/JUSTC
        env:
          OUTPUT_DIR: ${{ needs.compile-wasm.outputs.dirpath }}
      - name: Commit to Website
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source-directory: "javascript_output/${{ needs.compile-wasm.outputs.dirpath }}"
          destination-github-username: js-just
          destination-repository-name: website
          user-email: "support@juststudio.is-a.dev"
          target-branch: main
          target-directory: "justc/${{ needs.compile-wasm.outputs.dirpath }}"
      - name: Commit to JUSTC.js
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source-directory: "javascript_output/${{ needs.compile-wasm.outputs.dirpath }}"
          destination-github-username: js-just
          destination-repository-name: JUSTC.js
          user-email: "support@juststudio.is-a.dev"
          target-branch: main

  release-assets:
    if: github.event_name == 'release'
    needs:
      [
        compile-linux,
        compile-windows,
        compile-macos,
        compile-wasm
      ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - run: |
        mkdir release

        cp artifacts/**/justc* release/ || true
        cp artifacts/**/*.dll release/ || true
        cp artifacts/**/*.so release/ || true
        cp artifacts/**/*.dylib release/ || true
        cp artifacts/**/*.lib release/ || true

        mkdir js

        cp -r javascript_output/* js/ || true

        cd js
        zip -r ../justc-js.zip .
        cd ..

    - uses: softprops/action-gh-release@v2
      with:
        files: |
          release/*
          justc-js.zip
